# This script uploads application binaries as GitHub release assets.
name: release-assets
on:
  release:
    types:
      - created
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  TAG_NAME: ${{ github.event.release.tag_name }}

permissions: { }

jobs:
  build:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build artifacts
        run: |
          make artifacts
      - name: Upload linux amd64 binary
        run: gh release upload "$TAG_NAME" ./_artifacts/godog-$TAG_NAME-linux-amd64.tar.gz --clobber
      - name: Upload linux arm64 binary
        run: gh release upload "$TAG_NAME" ./_artifacts/godog-$TAG_NAME-linux-arm64.tar.gz --clobber
      - name: Upload darwin amd64 binary
        run: gh release upload "$TAG_NAME" ./_artifacts/godog-$TAG_NAME-darwin-amd64.tar.gz --clobber
