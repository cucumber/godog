# Gorelease comments public API changes to pull request.
name: gorelease
on:
  pull_request:
    branches:
      - '**'

permissions: {}

# Cancel the workflow in progress in newer build is about to start.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  GO_VERSION: stable
jobs:
  gorelease:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Install Go stable
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Gorelease cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go/bin/gorelease
          key: ${{ runner.os }}-gorelease-generic
      - name: Gorelease
        id: gorelease
        run: |
          test -e ~/go/bin/gorelease || go install golang.org/x/exp/cmd/gorelease@latest
          OUTPUT=$(gorelease 2>&1 || exit 0)
          echo "${OUTPUT}"
          OUTPUT="${OUTPUT//$'\n'/%0A}"
          echo "report=$OUTPUT" >> $GITHUB_OUTPUT
      - name: Comment Report
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: gorelease
          message: |
            ### Go API Changes

            <pre>
            ${{ steps.gorelease.outputs.report }}
            </pre>
